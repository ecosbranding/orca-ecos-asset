<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ECOS | Activo de Fidelidad</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root { --ecos-pink: #ff5a81; --ecos-dark: #000000; --glass: rgba(255, 255, 255, 0.03); }
        body { background: var(--ecos-dark); color: #fff; font-family: 'Inter', system-ui, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        .container { width: 100%; max-width: 380px; padding: 20px; box-sizing: border-box; text-align: center; }
        .main-logo { width: 180px; margin-bottom: 40px; filter: drop-shadow(0 0 10px rgba(255,90,129,0.2)); }
        .card { background: linear-gradient(145deg, #0f0f0f, #050505); border: 1px solid var(--glass); border-radius: 35px; padding: 35px 25px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); position: relative; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 30px 0; }
        .slot { aspect-ratio: 1; background: #111; border-radius: 50%; border: 1px solid #222; display: flex; align-items: center; justify-content: center; transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .slot.active { background: var(--ecos-pink); border-color: var(--ecos-pink); transform: scale(1.1); box-shadow: 0 0 20px rgba(255,90,129,0.4); }
        .slot img { width: 65%; height: 65%; opacity: 0; transform: scale(0.5); transition: 0.4s ease; }
        .slot.active img { opacity: 1; transform: scale(1); }
        #qrcode { background: #fff; padding: 15px; border-radius: 20px; display: inline-block; margin-top: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .input-group { display: flex; flex-direction: column; gap: 15px; }
        input { background: #111; border: 1px solid #333; color: #fff; padding: 20px; border-radius: 18px; font-size: 1rem; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--ecos-pink); box-shadow: 0 0 15px rgba(255,90,129,0.1); }
        button { background: var(--ecos-pink); color: #fff; border: none; padding: 20px; border-radius: 18px; font-weight: 800; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div id="auth">
            <img src="https://i.ibb.co/qY7z8Yx/ecos-logo-white.png" class="main-logo" alt="ECOS">
            <div class="input-group">
                <input type="tel" id="userPhone" placeholder="WhatsApp (Ej: 0979010077)">
                <button onclick="initApp()">Generar Tarjeta</button>
            </div>
        </div>

        <div id="dashboard" style="display:none">
            <div class="card">
                <img src="https://i.ibb.co/6N6C9Kz/ecos-horizontal-pink.png" style="width:120px" alt="ECOS">
                <div class="grid" id="stampGrid"></div>
                <div id="qrcode"></div>
                <p style="font-size: 0.7rem; color: #555; margin-top: 20px; letter-spacing: 1px;">VISIÓN • IMPACTO • PERMANENCIA</p>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://ecos-loyalty-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function initApp() {
            const phone = document.getElementById('userPhone').value;
            if(!phone) return;
            document.getElementById('auth').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            
            QRCode.toCanvas(document.getElementById('qrcode'), phone, { width: 160, margin: 0, color: { dark: '#000', light: '#fff' } });
            
            db.ref('ecos_users/' + phone).on('value', (snap) => {
                renderStamps(snap.val() || 0);
            });
        }

        function renderStamps(count) {
            const grid = document.getElementById('stampGrid');
            grid.innerHTML = '';
            for(let i=0; i<8; i++) {
                const slot = document.createElement('div');
                slot.className = `slot ${i < count ? 'active' : ''}`;
                slot.innerHTML = `<img src="https://i.ibb.co/C0mN4gT/ecos-icon-white.png">`;
                grid.appendChild(slot);
            }
        }
    </script>
</body>
</html>
