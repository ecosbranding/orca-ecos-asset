<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ECOS | Mi Tarjeta</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #000; --accent: #dd2a7b; --glass: rgba(255,255,255,0.05); }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { width: 100%; max-width: 350px; background: #0a0a0a; border-radius: 30px; padding: 35px; border: 1px solid var(--glass); text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .logo svg { width: 70px; height: 70px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 25px 0; }
        .slot { width: 60px; height: 60px; background: #111; border-radius: 50%; border: 1px dashed #333; display: flex; align-items: center; justify-content: center; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .slot.stamped { background: var(--accent); border: none; transform: scale(1.05); }
        .slot.stamped::after { content: ''; width: 70%; height: 70%; background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M78 50 a28 28 0 1 1 -28 -28 a28 28 0 0 1 20 8 L 60 41 c-2.5 -2.5 -6 -4 -10 -4 a16 16 0 1 0 16 16 L 78 50 L 45 50" fill="white"/></svg>'); background-size: contain; background-repeat: no-repeat; background-position: center; }
        #qrcode { background: white; padding: 12px; border-radius: 15px; display: inline-block; margin-top: 20px; }
        .login-box { text-align: center; width: 100%; max-width: 320px; }
        input { background: #151515; border: 1px solid #333; color: #fff; padding: 18px; border-radius: 12px; width: 100%; margin-bottom: 15px; font-size: 1rem; }
        button { background: var(--accent); color: #fff; border: none; padding: 18px; border-radius: 12px; width: 100%; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="loginSection" class="login-box">
        <div class="logo"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="50" fill="#dd2a7b"/><path d="M78 50 a28 28 0 1 1 -28 -28 a28 28 0 0 1 20 8 L 60 41 c-2.5 -2.5 -6 -4 -10 -4 a16 16 0 1 0 16 16 L 78 50 L 45 50" fill="white"/></svg></div>
        <h2 style="letter-spacing:2px">IDENTIDAD ECOS</h2>
        <input type="tel" id="whatsapp" placeholder="Tu número de WhatsApp">
        <button onclick="accessCard()">Acceder a mi Activo</button>
    </div>

    <div id="cardSection" class="card" style="display:none">
        <div class="logo"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="50" fill="#dd2a7b"/><path d="M78 50 a28 28 0 1 1 -28 -28 a28 28 0 0 1 20 8 L 60 41 c-2.5 -2.5 -6 -4 -10 -4 a16 16 0 1 0 16 16 L 78 50 L 45 50" fill="white"/></svg></div>
        <h3 id="userDisplay" style="margin:0; font-size:0.9rem; color:var(--accent)"></h3>
        <div class="grid" id="stampGrid"></div>
        <div id="qrcode"></div>
        <p style="color:#555; font-size:0.65rem; margin-top:20px; text-transform:uppercase; letter-spacing:1px">Muestra este código al negocio para sellar</p>
    </div>

    <script>
        // CONFIGURACIÓN FIREBASE (ECOS CLOUD)
        const firebaseConfig = { databaseURL: "https://ecos-loyalty-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function accessCard() {
            const num = document.getElementById('whatsapp').value;
            if(!num) return alert("Ingresa tu número");
            
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('cardSection').style.display = 'block';
            document.getElementById('userDisplay').innerText = "CLIENTE: " + num;
            
            QRCode.toCanvas(document.getElementById('qrcode'), num, { width: 140, margin: 2 });
            
            // Escuchar cambios en tiempo real desde la nube
            db.ref('users/' + num).on('value', (snapshot) => {
                const count = snapshot.val() || 0;
                renderGrid(count);
                if(count > 0 && navigator.vibrate) navigator.vibrate(100);
            });
        }

        function renderGrid(count) {
            const grid = document.getElementById('stampGrid');
            grid.innerHTML = '';
            for(let i=0; i<8; i++) {
                const slot = document.createElement('div');
                slot.className = 'slot' + (i < count ? ' stamped' : '');
                grid.appendChild(slot);
            }
        }
    </script>
</body>
</html>
