<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ECOS | Activo Digital</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root { --ecos-pink: #ff5a81; --ecos-dark: #000; }
        body { background: var(--ecos-dark); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        .container { width: 90%; max-width: 380px; text-align: center; position: relative; }
        
        /* Contenedor del Logo de Perfil (Login) */
        .profile-container { position: relative; width: 110px; height: 110px; margin: 0 auto 20px; border-radius: 50%; border: 2px solid var(--ecos-pink); padding: 5px; box-shadow: 0 0 15px rgba(255, 90, 129, 0.3); }
        .profile-logo { width: 100%; height: 100%; border-radius: 50%; object-fit: contain; background: #000; }
        
        /* Tarjeta de Fidelidad */
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 30px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        
        /* Contenedor de Logo Redondeado (En la tarjeta) */
        .rounded-logo-box { background: rgba(255, 255, 255, 0.05); border-radius: 20px; padding: 15px; display: inline-block; margin-bottom: 20px; backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); }
        .card-logo { width: 130px; display: block; }
        
        /* Cuadrícula de Sellos */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; }
        .slot { aspect-ratio: 1; background: #111; border-radius: 50%; border: 1px solid #222; display: flex; align-items: center; justify-content: center; transition: 0.4s; overflow: hidden; }
        .slot.active { background: var(--ecos-pink); border: none; transform: scale(1.05); }
        .slot img { width: 60%; display: none; }
        .slot.active img { display: block; }
        
        /* QR */
        #qrcode { background: #fff; padding: 10px; border-radius: 15px; display: inline-block; margin-top: 5px; }
        
        /* Inputs y Botones */
        .input-box { background: #121212; border: 1px solid #222; color: #fff; padding: 15px; border-radius: 12px; width: 100%; margin-bottom: 10px; box-sizing: border-box; text-align: center; font-size: 0.9rem; outline: none; }
        .btn-main { background: var(--ecos-pink); color: #fff; border: none; padding: 16px; border-radius: 12px; width: 100%; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Crédito */
        .footer { margin-top: 25px; font-size: 0.65rem; color: #444; letter-spacing: 1px; }
        .footer span { color: var(--ecos-pink); font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div id="authPanel">
            <div class="profile-container">
                <img src="ecos-logo-white.png" class="profile-logo" alt="ECOS Logo">
            </div>
            <h3 style="margin-bottom: 20px; font-weight: 300; letter-spacing: 1px;">Tarjeta de Fidelidad</h3>
            <input type="tel" id="userPhone" class="input-box" placeholder="WhatsApp (Ej: 0979010077)">
            <input type="password" id="userPin" class="input-box" placeholder="PIN de 4 dígitos" maxlength="4" inputmode="numeric">
            <button class="btn-main"
