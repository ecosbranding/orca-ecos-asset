<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ECOS | Mi Activo</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root { --ecos-pink: #ff5a81; --ecos-dark: #000; }
        body { background: var(--ecos-dark); color: #fff; font-family: sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { width: 90%; max-width: 380px; text-align: center; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 30px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .main-logo { width: 160px; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 25px 0; }
        .slot { aspect-ratio: 1; background: #111; border-radius: 50%; border: 1px solid #222; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .slot.active { background: var(--ecos-pink); border: none; }
        .slot img { width: 70%; height: 70%; display: none; }
        .slot.active img { display: block; }
        #qrcode { background: #fff; padding: 12px; border-radius: 15px; display: inline-block; margin-top: 20px; }
        input { background: #151515; border: 1px solid #333; color: #fff; padding: 18px; border-radius: 12px; width: 100%; margin-bottom: 15px; box-sizing: border-box; }
        button { background: var(--ecos-pink); color: #fff; border: none; padding: 18px; border-radius: 12px; width: 100%; font-weight: 900; letter-spacing: 1px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div id="loginSection">
            <img src="ecos-logo-white.png" class="main-logo" alt="ECOS">
            <input type="tel" id="whatsapp" placeholder="WhatsApp (Ej: 0979010077)">
            <button onclick="initCard()">Generar Tarjeta</button>
        </div>

        <div id="cardSection" style="display:none" class="card">
            <img src="ecos-horizontal-pink.png" style="width:110px; margin-bottom:10px;">
            <div class="grid" id="stampGrid"></div>
            <div id="qrcode"></div>
            <p style="color:#444; font-size:0.6rem; margin-top:20px; letter-spacing:1px">VISIÓN • IMPACTO • PERMANENCIA</p>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://ecos-loyalty-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function initCard() {
            const num = document.getElementById('whatsapp').value;
            if(!num) return alert("Ingresa tu número");
            
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('cardSection').style.display = 'block';
            
            QRCode.toCanvas(document.getElementById('qrcode'), num, { width: 150, margin: 1 });
            
            db.ref('ecos_users/' + num).on('value', (snapshot) => {
                const count = snapshot.val() || 0;
                const grid = document.getElementById('stampGrid');
                grid.innerHTML = '';
                for(let i=0; i<8; i++) {
                    const slot = document.createElement('div');
                    slot.className = 'slot' + (i < count ? ' active' : '');
                    slot.innerHTML = '<img src="ecos-icon-white.png">';
                    grid.appendChild(slot);
                }
            });
        }
    </script>
</body>
</html>
