<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ECOS | Activo Digital</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root { --ecos-pink: #ff5a81; --ecos-dark: #000; }
        body { background: var(--ecos-dark); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        .container { width: 90%; max-width: 380px; text-align: center; position: relative; }
        
        /* Logo Circular Estilo Perfil */
        .profile-logo { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid var(--ecos-pink); margin: 0 auto 30px; display: block; box-shadow: 0 0 20px rgba(255, 90, 129, 0.4); }
        
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 35px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 25px 0; }
        .slot { aspect-ratio: 1; background: #111; border-radius: 12px; border: 1px solid #222; display: flex; align-items: center; justify-content: center; transition: 0.5s; }
        .slot.active { background: var(--ecos-pink); border: none; transform: scale(1.05); }
        .slot img { width: 65%; display: none; }
        .slot.active img { display: block; }
        
        #qrcode { background: #fff; padding: 15px; border-radius: 20px; display: inline-block; margin-top: 10px; }
        .input-box { background: #121212; border: 1px solid #222; color: #fff; padding: 18px; border-radius: 15px; width: 100%; margin-bottom: 12px; box-sizing: border-box; text-align: center; font-size: 1rem; outline: none; }
        .btn-main { background: var(--ecos-pink); color: #fff; border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        
        .footer-credit { margin-top: 40px; font-size: 0.7rem; color: #444; letter-spacing: 1px; }
        .footer-credit span { color: var(--ecos-pink); font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div id="authPanel">
            <img src="ecos-icon-white.png" class="profile-logo" alt="ECOS Profile">
            <h2 style="margin-bottom: 25px; font-weight: 300;">Tarjeta de Fidelidad</h2>
            <input type="tel" id="userPhone" class="input-box" placeholder="WhatsApp (0979010077)">
            <input type="password" id="userPin" class="input-box" placeholder="PIN de 4 dígitos" maxlength="4">
            <button class="btn-main" onclick="accessSystem()">Ingresar</button>
        </div>

        <div id="cardPanel" style="display:none">
            <div class="card">
                <img src="ecos-horizontal-pink.png" style="width:110px; margin-bottom:15px;">
                <p style="font-size: 0.8rem; color: #666; margin: 0;">Progreso de sellos</p>
                <div class="grid" id="stampGrid"></div>
                <div id="qrcode"></div>
                <p style="color:#222; font-size:0.6rem; margin-top:20px; font-weight:bold; letter-spacing:1px">VISIÓN • IMPACTO • PERMANENCIA</p>
            </div>
            <button class="btn-main" style="margin-top:20px; background:#111; border: 1px solid #222;" onclick="location.reload()">Cerrar Sesión</button>
        </div>

        <div class="footer-credit">Powered by <span>ORCA Studios</span></div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://ecos-loyalty-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        async function accessSystem() {
            const phone = document.getElementById('userPhone').value;
            const pin = document.getElementById('userPin').value;

            if(phone.length < 9 || pin.length !== 4) {
                return alert("Por favor verifica tus datos.");
            }

            const userRef = db.ref('ecos_users/' + phone);
            const snapshot = await userRef.get();
            const userData = snapshot.val();

            if (userData) {
                if (userData.pin === pin) {
                    launchDashboard(phone);
                } else {
                    alert("PIN incorrecto. Intenta de nuevo.");
                }
            } else {
                // Registro automático si es nuevo
                await userRef.set({ pin: pin, stamps: 0 });
                launchDashboard(phone);
            }
        }

        function launchDashboard(phone) {
            document.getElementById('authPanel').style.display = 'none';
            document.getElementById('cardPanel').style.display = 'block';

            // Generar el QR inmediatamente
            QRCode.toCanvas(document.getElementById('qrcode'), phone, { width: 150, margin: 1 });

            // Escuchar los sellos en tiempo real
            db.ref('ecos_users/' + phone + '/stamps').on('value', (snap) => {
                const count = snap.val() || 0;
                const grid = document.getElementById('stampGrid');
                grid.innerHTML = '';
                for(let i=0; i<8; i++) {
                    const slot = document.createElement('div');
                    slot.className = 'slot' + (i < count ? ' active' : '');
                    slot.innerHTML = '<img src="ecos-icon-white.png">';
                    grid.appendChild(slot);
                }
            });
        }
    </script>
</body>
</html>
