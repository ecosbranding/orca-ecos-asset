<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ECOS | Loyalty System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --accent: #dd2a7b; --success: #00ff00; --glass: rgba(255,255,255,0.05); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        /* Card Estilo Luxury */
        .card { width: 100%; max-width: 360px; background: #0a0a0a; border-radius: 30px; padding: 40px 30px; border: 1px solid var(--glass); text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.8); position: relative; }
        
        /* Logo ECOS Blindado (SVG directo) */
        .logo { width: 80px; height: 80px; margin: 0 auto 20px; }
        .logo svg { width: 100%; height: 100%; }
        
        h2 { font-weight: 900; letter-spacing: 4px; font-size: 1.2rem; text-transform: uppercase; margin: 0; }
        .sub { font-size: 0.7rem; color: #666; letter-spacing: 2px; text-transform: uppercase; margin-top: 10px; margin-bottom: 30px; }
        
        /* Grilla de Sellos */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 30px; }
        .slot { width: 65px; height: 65px; background: #111; border-radius: 50%; border: 1px dashed #333; position: relative; display: flex; align-items: center; justify-content: center; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); overflow: hidden; }
        
        /* Animación de Sello de Autor */
        .slot.stamped { background: var(--accent); border: none; transform: scale(1); box-shadow: 0 0 20px rgba(221, 42, 123, 0.4); }
        .slot.stamped::after { content: ''; width: 70%; height: 70%; background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M78 50 a28 28 0 1 1 -28 -28 a28 28 0 0 1 20 8 L 60 41 c-2.5 -2.5 -6 -4 -10 -4 a16 16 0 1 0 16 16 L 78 50 L 45 50" fill="white"/></svg>'); background-size: contain; background-repeat: no-repeat; background-position: center; animation: stampAnim 0.4s ease-out; }

        @keyframes stampAnim { 0% { transform: scale(3); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .status-text { font-size: 0.75rem; font-weight: 700; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
        
        /* Panel de Control (Oculto para el cliente, activado por el negocio) */
        .admin-panel { width: 100%; max-width: 360px; margin-top: 30px; padding: 20px; background: rgba(255,255,255,0.02); border-radius: 20px; border: 1px solid var(--glass); }
        .btn-stamp { background: var(--accent); color: #fff; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .btn-stamp:active { transform: scale(0.95); }
        .btn-reset { background: transparent; color: #444; border: none; margin-top: 15px; font-size: 0.6rem; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="50" fill="#dd2a7b"/>
                <path d="M78 50 a28 28 0 1 1 -28 -28 a28 28 0 0 1 20 8 L 60 41 c-2.5 -2.5 -6 -4 -10 -4 a16 16 0 1 0 16 16 L 78 50 L 45 50" fill="white"/>
            </svg>
        </div>
        
        <h2>Fidelidad ECOS</h2>
        <p class="sub">Tu marca, tu legado</p>

        <div class="grid" id="grid">
            </div>

        <div class="status-text" id="status">0 / 8 SELLOS DE AUTOR</div>
    </div>

    <div class="admin-panel">
        <button class="btn-stamp" onclick="addStamp()">Añadir Sello (Admin)</button>
        <button class="btn-reset" onclick="resetCard()">Reiniciar Tarjeta</button>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const statusText = document.getElementById('status');
        const TOTAL_STAMPS = 8;
        
        // Cargar sellos guardados en este celular
        let currentStamps = parseInt(localStorage.getItem('ecos_stamps')) || 0;

        function initGrid() {
            grid.innerHTML = '';
            for (let i = 0; i < TOTAL_STAMPS; i++) {
                const slot = document.createElement('div');
                slot.className = 'slot' + (i < currentStamps ? ' stamped' : '');
                grid.appendChild(slot);
            }
            updateStatus();
        }

        function addStamp() {
            if (currentStamps < TOTAL_STAMPS) {
                currentStamps++;
                localStorage.setItem('ecos_stamps', currentStamps);
                initGrid();
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]); // Vibración premium
            }
        }

        function resetCard() {
            if(confirm("¿Seguro que quieres reiniciar?")) {
                currentStamps = 0;
                localStorage.setItem('ecos_stamps', 0);
                initGrid();
            }
        }

        function updateStatus() {
            statusText.innerText = currentStamps === TOTAL_STAMPS 
                ? "¡RECOMPENSA LISTA!" 
                : `${currentStamps} / ${TOTAL_STAMPS} SELLOS DE AUTOR`;
            statusText.style.color = currentStamps === TOTAL_STAMPS ? 'var(--success)' : 'var(--accent)';
        }

        initGrid();
    </script>
</body>
</html>
