<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ECOS | Activo Digital</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root { --ecos-pink: #ff5a81; --ecos-dark: #000; }
        body { background: var(--ecos-dark); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow-y: auto; }
        .container { width: 90%; max-width: 380px; text-align: center; padding: 20px 0; }
        
        /* Contenedor del Logo de Perfil (Login) */
        .profile-container { width: 110px; height: 110px; margin: 0 auto 20px; border-radius: 50%; border: 2px solid var(--ecos-pink); padding: 5px; display: flex; align-items: center; justify-content: center; background: #000; }
        .profile-logo { width: 90%; height: 90%; border-radius: 50%; object-fit: contain; }
        
        /* TARJETA VISIBLE (Forzamos la visualización) */
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 30px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; width: 100%; box-sizing: border-box; }
        .rounded-logo-box { background: rgba(255, 255, 255, 0.05); border-radius: 20px; padding: 15px; display: inline-block; margin-bottom: 20px; }
        .card-logo { width: 130px; display: block; }
        
        /* Cuadrícula de Sellos (CRÍTICO: CSS REPARADO) */
        .stamp-grid { display: grid !important; grid-template-columns: repeat(4, 1fr) !important; gap: 10px !important; margin: 20px 0 !important; width: 100% !important; max-width: 100% !important; opacity: 1 !important; visibility: visible !important; }
        .slot { aspect-ratio: 1 !important; background: #111; border-radius: 50%; border: 1px solid #222; display: flex !important; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .slot.active { background: var(--ecos-pink); border: none; transform: scale(1.03); }
        
        /* El icono rosa de sellos marcados */
        .slot img { width: 65%; display: none; }
        .slot.active img { display: block; }

        /* Estilo de los números de los sellos sin marcar (Estilo Imagen 31/32) */
        .slot::after { content: attr(data-index); color: #333; font-size: 1.2rem; font-weight: bold; position: absolute; }
        .slot.active::after { display: none; }
        
        /* QR Visible */
        #qrcode-container { background: #fff; padding: 10px; border-radius: 15px; display: inline-block; margin: 10px 0; }
        canvas { display: block !important; }
        
        /* UI */
        .input-box { background: #121212; border: 1px solid #222; color: #fff; padding: 15px; border-radius: 12px; width: 100%; margin-bottom: 15px; box-sizing: border-box; text-align: center; }
        .btn-main { background: var(--ecos-pink); color: #fff; border: none; padding: 18px; border-radius: 12px; width: 100%; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .footer { margin-top: 25px; font-size: 0.65rem; color: #444; }
        .footer span { color: var(--ecos-pink); font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div id="authPanel">
            <div class="profile-container">
                <img src="ecos-logo-white.png" class="profile-logo">
            </div>
            <h3 style="margin-bottom: 20px;">Tarjeta de Fidelidad</h3>
            <input type="tel" id="userPhone" class="input-box" placeholder="WhatsApp (Ej: 0979010077)">
            <input type="password" id="userPin" class="input-box" placeholder="PIN de 4 dígitos" maxlength="4">
            <button class="btn-main" onclick="accessSystem()">Ingresar</button>
        </div>

        <div id="cardPanel" style="display:none">
            <div class="card">
                <div class="rounded-logo-box">
                    <img src="ecos-horizontal-pink.png" class="card-logo">
                </div>
                
                <div class="stamp-grid" id="stampGrid"></div>
                
                <p id="stampCount" style="font-size:0.8rem; color:#ff5a81; font-weight:bold; margin: 0 0 10px 0;">Cargando sellos...</p>
                
                <div id="qrcode-container">
                    <canvas id="qr-canvas"></canvas>
                </div>
                
                <p style="color:#444; font-size:0.6rem; margin-top:15px; font-weight:bold; letter-spacing:1px">VISIÓN • IMPACTO • PERMANENCIA</p>
            </div>
            <button class="btn-main" style="margin-top:20px; background:#111; border: 1px solid #222;" onclick="location.reload()">Cerrar Sesión</button>
        </div>
        
        <div class="footer">Hecho por <span>ORCA Studios</span></div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://ecos-loyalty-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function accessSystem() {
            const phone = document.getElementById('userPhone').value;
            const pin = document.getElementById('userPin').value;
            if(phone.length < 9) return alert("Número incompleto");

            // Cambio de pantalla
            document.getElementById('authPanel').style.display = 'none';
            document.getElementById('cardPanel').style.display = 'block';

            // Generar QR en el canvas específico
            QRCode.toCanvas(document.getElementById('qr-canvas'), phone, { width: 140, margin: 1 });

            const userRef = db.ref('ecos_users/' + phone);
            
            // Asegurar que el usuario existe en Firebase al loguearse
            userRef.get().then((snap) => {
                if (!snap.exists()) userRef.set({ pin: pin, stamps: 0 });
            });

            // ESCUCHA EN TIEMPO REAL: Se marca apenas el admin escanea (Igual que Imagen 32)
            userRef.child('stamps').on('value', (snap) => {
                const count = snap.val() || 0;
                
                // Actualizar texto del contador
                document.getElementById('stampCount').innerText = count + " de 8 sellos de autor";
                
                const grid = document.getElementById('stampGrid');
                grid.innerHTML = ''; // Limpiar cuadrícula

                for(let i=0; i<8; i++) {
                    const slot = document.createElement('div');
                    slot.className = 'slot' + (i < count ? ' active' : '');
                    slot.setAttribute('data-index', i + 1); // Número para sellos vacíos
                    
                    // Imagen del logo blanco para los sellos activos (rosa sobre rosa)
                    slot.innerHTML = '<img src="ecos-logo-white.png">';
                    grid.appendChild(slot);
                }
            });
        }
    </script>
</body>
</html>
