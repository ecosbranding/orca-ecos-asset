<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ECOS Admin | Gestión</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icono-blanco.png">
    <link rel="manifest" href="admin-manifest.json">
    <meta name="theme-color" content="#ff5a81">

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    
    <style>
        :root { --ecos-pink: #ff5a81; --ecos-dark: #000; }
        body { background: var(--ecos-dark); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { width: 90%; max-width: 380px; text-align: center; }
        
        /* Icono de Marca Rosa */
        .brand-circle {
            width: 100px; height: 100px; background: var(--ecos-pink);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; border: 3px solid #fff; box-shadow: 0 0 20px rgba(255, 90, 129, 0.4);
        }
        .circle-logo { width: 60%; }

        .card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 30px; padding: 25px; }
        
        /* Escáner */
        #reader { width: 100%; border-radius: 20px; overflow: hidden; border: 2px solid var(--ecos-pink) !important; background: #000; }
        
        .status-box { margin-top: 20px; padding: 15px; border-radius: 15px; background: #111; font-size: 0.9rem; }
        .btn-add { background: var(--ecos-pink); color: #fff; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; margin-top: 15px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand-circle"><img src="icono-blanco.png" class="circle-logo"></div>
        <h2 style="letter-spacing: 2px; font-weight: 300;">ADMIN PANEL</h2>
        
        <div class="card">
            <div id="reader"></div>
            <div class="status-box" id="status">Esperando escaneo de cliente...</div>
            <button id="addBtn" class="btn-add" onclick="addStamp()">+ ASIGNAR SELLO</button>
        </div>
        
        <p style="font-size: 0.7rem; color: #444; margin-top: 20px;">ORCA STUDIOS • SISTEMA DE ACTIVOS</p>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://ecos-loyalty-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let activePhone = null;

        function onScanSuccess(decodedText) {
            activePhone = decodedText;
            document.getElementById('status').innerHTML = `Cliente: <b>${activePhone}</b>`;
            document.getElementById('status').style.color = "#ff5a81";
            document.getElementById('addBtn').style.display = "block";
        }

        function addStamp() {
            if(!activePhone) return;
            const ref = db.ref('ecos_users/' + activePhone + '/stamps');
            ref.transaction((current) => (current || 0) + 1);
            alert("Sello asignado con éxito a " + activePhone);
            document.getElementById('addBtn').style.display = "none";
            document.getElementById('status').innerText = "Esperando escaneo de cliente...";
            document.getElementById('status').style.color = "#fff";
        }

        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
