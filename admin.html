<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECOS Admin</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        body { background: #fff; color: #000; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #reader { width: 100%; max-width: 400px; border-radius: 20px; overflow: hidden; border: 2px solid #ff5a81; margin-top: 20px; }
        .header { text-align: center; }
    </style>
</head>
<body>
    <div class="header">
        <img src="ecos-horizontal-black.png" style="width:140px">
        <p style="font-weight:bold; color:#ff5a81; margin-top:5px">SISTEMA DE SELLADO</p>
    </div>
    <div id="reader"></div>
    <div id="msg" style="margin-top:20px; font-weight:bold">Listo para escanear...</div>

    <script>
        const firebaseConfig = { databaseURL: "https://ecos-loyalty-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function onScanSuccess(decodedText) {
            const userRef = db.ref('ecos_users/' + decodedText);
            userRef.get().then((snap) => {
                const data = snap.val();
                if(data && (data.stamps || 0) < 8) {
                    const newCount = (data.stamps || 0) + 1;
                    userRef.update({ stamps: newCount });
                    alert("¡Sello otorgado con éxito!");
                } else {
                    alert("Cliente no registrado o tarjeta llena");
                }
            });
        }
        new Html5QrcodeScanner("reader", { fps: 20, qrbox: 250 }).render(onScanSuccess);
    </script>
</body>
</html>
