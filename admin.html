<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECOS Admin | Control</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .btn { background: #ff5a81; color: #fff; border: none; padding: 20px; border-radius: 15px; width: 100%; font-size: 1.2rem; font-weight: bold; margin-top: 20px; }
        #reader { width: 100%; border-radius: 20px; overflow: hidden; border: 2px solid #ff5a81; }
    </style>
</head>
<body>
    <img src="ecos-horizontal-pink.png" style="width:150px; margin-bottom:30px;">
    <h2>Panel de Sellos</h2>
    <div id="reader"></div>
    <div id="result" style="margin-top:20px; font-size:1.2rem;"></div>
    <div style="margin-top:40px; font-size:0.7rem; color:#444;">Sistema Exclusivo de <b>ORCA Studios</b></div>

    <script>
        const firebaseConfig = { databaseURL: "https://ecos-loyalty-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decodedText) => {
            const userRef = db.ref('ecos_users/' + decodedText + '/stamps');
            userRef.transaction((currentStamps) => {
                return (currentStamps || 0) + 1;
            }).then(() => {
                alert("¡Sello sumado con éxito al número " + decodedText + "!");
            });
        });
    </script>
</body>
</html>
