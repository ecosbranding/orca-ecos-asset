<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ECOS Admin | Único</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="ecos-logo-white.png">
    <link rel="manifest" href="admin-manifest.json">
    <meta name="theme-color" content="#ff5a81">

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    
    <style>
        :root { --ecos-pink: #ff5a81; --ecos-dark: #000; }
        body { background: var(--ecos-dark); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { width: 90%; max-width: 380px; text-align: center; }
        
        .brand-circle {
            width: 100px; height: 100px; background: var(--ecos-pink);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; border: 3px solid #fff; box-shadow: 0 0 20px rgba(255, 90, 129, 0.4);
        }
        .circle-logo { width: 60%; }

        .card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 30px; padding: 25px; position: relative; }
        
        #reader { 
            width: 100%; 
            border-radius: 20px; 
            overflow: hidden; 
            border: 2px solid var(--ecos-pink) !important; 
            background: #000; 
        }

        /* Overlay para indicar que el escáner está pausado */
        #scanner-overlay {
            display: none;
            position: absolute;
            top: 25px; left: 25px; right: 25px; bottom: 105px;
            background: rgba(0,0,0,0.8);
            border-radius: 20px;
            z-index: 10;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .status-box { 
            margin-top: 20px; 
            padding: 20px; 
            border-radius: 15px; 
            background: #111; 
            font-size: 0.95rem; 
            border: 1px solid #222;
        }

        .btn-next { 
            background: var(--ecos-pink); 
            color: #fff; 
            border: none; 
            padding: 15px; 
            border-radius: 12px; 
            width: 100%; 
            font-weight: bold; 
            margin-top: 15px; 
            display: none; 
            cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand-circle">
            <img src="ecos-logo-white.png" class="circle-logo" alt="Logo">
        </div>
        <h2 style="letter-spacing: 2px; font-weight: 300; margin-bottom: 25px;">SISTEMA DE SELLOS</h2>
        
        <div class="card">
            <div id="scanner-overlay">
                <span style="color:#4CAF50; font-size: 3rem;">✓</span>
                <p>Procesado</p>
            </div>
            <div id="reader"></div>
            <div class="status-box" id="status">Iniciando cámara trasera...</div>
            <button id="nextBtn" class="btn-next" onclick="resetScanner()">Siguiente Cliente</button>
        </div>
        
        <p style="font-size: 0.7rem; color: #444; margin-top: 25px; letter-spacing: 1px;">ORCA STUDIOS • SEGURIDAD ACTIVA</p>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://ecos-loyalty-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let canScan = true; 

        function onScanSuccess(decodedText) {
            if (!canScan) return; 
            
            canScan = false; // Bloquea escaneos futuros inmediatamente
            const activePhone = decodedText;
            const statusEl = document.getElementById('status');
            const overlay = document.getElementById('scanner-overlay');
            const nextBtn = document.getElementById('nextBtn');
            
            statusEl.innerHTML = `Asignando a: <b style="color:#ff5a81">${activePhone}</b>...`;
            
            const ref = db.ref('ecos_users/' + activePhone + '/stamps');
            ref.transaction((current) => (current || 0) + 1, (error, committed) => {
                if (committed) {
                    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                    
                    statusEl.innerHTML = `<span style="color:#4CAF50; font-weight:bold;">¡SELLO OTORGADO!</span>`;
                    overlay.style.display = 'flex'; // Muestra bloqueo visual sobre la cámara
                    nextBtn.style.display = 'block'; // Muestra botón para rehabilitar
                } else {
                    canScan = true;
                    statusEl.innerText = "Error. Reintenta.";
                }
            });
        }

        function resetScanner() {
            canScan = true;
            document.getElementById('scanner-overlay').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('status').innerText = "Esperando próximo cliente...";
            document.getElementById('status').style.color = "#fff";
        }

        const html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 15, qrbox: { width: 250, height: 250 } }, 
            onScanSuccess
        ).then(() => {
            document.getElementById('status').innerText = "Listo para escanear";
        }).catch(err => {
            document.getElementById('status').innerText = "Permite el acceso a la cámara.";
        });
    </script>
</body>
</html>
